<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Score — Care Plus</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- CSS próprio -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-wrapper">

    

    <!-- Tabs -->
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')">
          Entrar
        </button>
        <button class="auth-tab" id="tab-register" onclick="showTab('register')">
          Cadastrar
        </button>
      </div>

      <!-- LOGIN -->
      <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="auth-label">E-mail</label>
          <input
            type="email"
            id="login-email"
            class="auth-input"
            placeholder="seu@email.com"
            required
          />
        </div>
        <div class="mb-4">
          <label class="auth-label">Senha</label>
          <input
            type="password"
            id="login-password"
            class="auth-input"
            placeholder="••••••••"
            required
          />
        </div>
        <div id="login-error" class="auth-error hidden">
          E-mail ou senha incorretos.
        </div>
        <button type="submit" class="auth-btn-primary w-full">
          Entrar
        </button>
        <p class="auth-switch">
          Não tem conta?
          <span onclick="showTab('register')">Cadastre-se</span>
        </p>
      </form>

      <!-- CADASTRO -->
      <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="mb-3">
          <label class="auth-label">Nome completo</label>
          <input
            type="text"
            id="reg-name"
            class="auth-input"
            placeholder="Seu nome"
            required
          />
        </div>
        <div class="mb-3">
          <label class="auth-label">E-mail</label>
          <input
            type="email"
            id="reg-email"
            class="auth-input"
            placeholder="seu@email.com"
            required
          />
        </div>
        <div class="mb-3">
          <label class="auth-label">Senha</label>
          <input
            type="password"
            id="reg-password"
            class="auth-input"
            placeholder="Mínimo 6 caracteres"
            minlength="6"
            required
          />
        </div>

        <hr class="auth-divider" />
        <p class="auth-section-title">Seu Pet</p>

        <div class="mb-3">
          <label class="auth-label">Nome do pet</label>
          <input
            type="text"
            id="reg-pet-name"
            class="auth-input"
            placeholder="Ex: Bolinha"
            required
          />
        </div>

        <div class="mb-4">
          <label class="auth-label">Cor do pet</label>
          <div class="color-picker" id="color-picker">
            <button type="button" class="color-option selected" data-color="#4FACDE" style="background:#4FACDE;" onclick="selectColor(this)"></button>
            <button type="button" class="color-option" data-color="#28A745" style="background:#28A745;" onclick="selectColor(this)"></button>
            <button type="button" class="color-option" data-color="#F5A623" style="background:#F5A623;" onclick="selectColor(this)"></button>
            <button type="button" class="color-option" data-color="#EC4899" style="background:#EC4899;" onclick="selectColor(this)"></button>
            <button type="button" class="color-option" data-color="#7C3AED" style="background:#7C3AED;" onclick="selectColor(this)"></button>
            <button type="button" class="color-option" data-color="#EF4444" style="background:#EF4444;" onclick="selectColor(this)"></button>
          </div>
        </div>

        <div id="register-error" class="auth-error hidden">
          Este e-mail já está cadastrado.
        </div>

        <button type="submit" class="auth-btn-primary w-full">
          Criar conta
        </button>
        <p class="auth-switch">
          Já tem conta?
          <span onclick="showTab('login')">Entrar</span>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>

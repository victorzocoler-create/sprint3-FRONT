<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet — Health Score Care Plus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pet.css" />
</head>
<body class="page-wrapper">

  <nav class="navbar-cp">
    <img src="assets/logo.png" alt="Care Plus" class="logo-img" />
    <div class="navbar-pills">
      <div class="pill"><span id="nav-ps">9.200 PS</span></div>
    </div>
  </nav>

  <div class="container-fluid px-3 pt-3">

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h1 class="fw-black mb-0" id="pet-name" style="font-size:20px;">Bolinha</h1>
            <p class="text-muted mb-0" style="font-size:12px;">Seu companheiro de saúde</p>
        </div>
        <div class="text-end">
            <p class="section-title mb-0">Saldo</p>
            <p class="fw-black mb-0" style="color:#1B6DB8; font-size:15px;" id="pet-ps">9.200 PS</p>
        </div>
      <!-- Poderes Elementais -->
        <p class="section-title">Poderes Elementais</p>
        <div id="poderes-list" class="d-flex flex-column gap-2 mb-4"></div>
    </div>

    <!-- Pet display -->
    <div class="pet-display mb-3">
      <svg id="pet-svg" viewBox="0 0 200 220" width="180" height="180"></svg>
      <p class="pet-mood" id="pet-mood">😄 Feliz e saudável!</p>
    </div>

    <!-- Stats -->
    <div class="content-card mb-3">
      <div class="pet-stat mb-3">
        <div class="d-flex justify-content-between mb-1">
          <span class="pet-stat-label">🍎 Fome</span>
          <span class="pet-stat-val" id="val-hunger">100%</span>
        </div>
        <div class="progress" style="height:10px; border-radius:999px;">
          <div id="bar-hunger" class="progress-bar" style="width:100%; background:#EF4444; border-radius:999px; transition:width 0.6s;"></div>
        </div>
      </div>
      <div class="pet-stat mb-3">
        <div class="d-flex justify-content-between mb-1">
          <span class="pet-stat-label">🛁 Higiene</span>
          <span class="pet-stat-val" id="val-hygiene">100%</span>
        </div>
        <div class="progress" style="height:10px; border-radius:999px;">
          <div id="bar-hygiene" class="progress-bar" style="width:100%; background:#0EA5E9; border-radius:999px; transition:width 0.6s;"></div>
        </div>
      </div>
      <div class="pet-stat mb-3">
        <div class="d-flex justify-content-between mb-1">
          <span class="pet-stat-label">😄 Alegria</span>
          <span class="pet-stat-val" id="val-happiness">100%</span>
        </div>
        <div class="progress" style="height:10px; border-radius:999px;">
          <div id="bar-happiness" class="progress-bar" style="width:100%; background:#F5A623; border-radius:999px; transition:width 0.6s;"></div>
        </div>
      </div>
      <div class="pet-stat">
        <div class="d-flex justify-content-between mb-1">
          <span class="pet-stat-label">⚡ Energia</span>
          <span class="pet-stat-val" id="val-energy">100%</span>
        </div>
        <div class="progress" style="height:10px; border-radius:999px;">
          <div id="bar-energy" class="progress-bar" style="width:100%; background:#7C3AED; border-radius:999px; transition:width 0.6s;"></div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <p class="section-title">Cuidar do Pet</p>
    <div class="pet-actions mb-4" id="pet-actions"></div>

  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><div class="nav-icon">🏠</div>Início</a>
    <a href="ranking.html"><div class="nav-icon">🏆</div>Ranking</a>
    <a href="vantagens.html"><div class="nav-icon">🎁</div>Vantagens</a>
    <a href="pet.html" class="active"><div class="nav-icon">🐾</div>Pet</a>
    <a href="perfil.html"><div class="nav-icon">👤</div>Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pet.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vantagens — Health Score Care Plus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/vantagens.css" />
</head>
<body class="page-wrapper">

  <nav class="navbar-cp">
    <img src="assets/logo.png" alt="Care Plus" class="logo-img" />
    <div class="navbar-pills">
      <div class="pill"><span id="nav-ps">9.200 PS</span></div>
    </div>
  </nav>

  <div class="container-fluid px-3 pt-4">
    <h1 class="fw-black mb-1" style="font-size:24px;">Clube de Vantagens</h1>
    <p class="text-muted mb-3" style="font-size:13px;">Troque seus PS por benefícios reais</p>

    <!-- Saldo -->
    <div class="saldo-card mb-3">
      <div>
        <p class="saldo-label">Seu saldo</p>
        <p class="saldo-value" id="saldo-ps">9.200 PS</p>
      </div>
      <div class="text-end">
        <p class="saldo-label">Nível atual</p>
        <p class="saldo-nivel" id="saldo-nivel">Recruta</p>
      </div>
    </div>

    <!-- Vouchers -->
    <p class="section-title">Vouchers Disponíveis</p>
    <div id="vouchers-list" class="d-flex flex-column gap-2 mb-4"></div>
  </div>

  <!-- Modal de confirmação -->
  <div class="modal fade" id="modal-voucher" tabindex="-1" aria-labelledby="modal-voucher-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:20px; border:none;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-black" id="modal-voucher-label">Resgatar Voucher</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="modal-voucher-info">
            <div class="modal-voucher-icon" id="modal-icon">🎁</div>
            <div>
              <p class="modal-voucher-name" id="modal-name">Voucher</p>
              <p class="modal-voucher-partner" id="modal-partner">Parceiro</p>
            </div>
          </div>
          <div class="modal-voucher-cost">
            <div>
              <p class="modal-cost-label">Custo</p>
              <p class="modal-cost-value" id="modal-cost">0 PS</p>
            </div>
            <div class="text-end">
              <p class="modal-cost-label">Seu saldo</p>
              <p class="modal-cost-value" id="modal-saldo">0 PS</p>
            </div>
            <div class="text-end">
              <p class="modal-cost-label">Saldo após</p>
              <p class="modal-cost-after" id="modal-after">0 PS</p>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0 gap-2">
          <button type="button" class="btn btn-light fw-bold flex-fill" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn-cp-primary flex-fill" id="modal-confirm-btn" onclick="confirmRedeem()">
            Confirmar Resgate
          </button>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><div class="nav-icon">🏠</div>Início</a>
    <a href="ranking.html"><div class="nav-icon">🏆</div>Ranking</a>
    <a href="vantagens.html" class="active"><div class="nav-icon">🎁</div>Vantagens</a>
    <a href="pet.html"><div class="nav-icon">🐾</div>Pet</a>
    <a href="perfil.html"><div class="nav-icon">👤</div>Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/vantagens.js"></script>
</body>
</html>

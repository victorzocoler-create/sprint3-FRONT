<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking — Health Score Care Plus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/ranking.css" />
</head>
<body class="page-wrapper">

  <nav class="navbar-cp">
    <img src="assets/logo.png" alt="Care Plus" class="logo-img" />
    <div class="navbar-pills">
      <div class="pill"><span id="nav-ps">9.200 PS</span></div>
    </div>
  </nav>

  <div class="container-fluid px-3 pt-4">
    <h1 class="fw-black mb-1" style="font-size:24px;">Ranking</h1>
    <p class="text-muted mb-3" style="font-size:13px;">Top cuidadores do mês</p>

    <!-- Dropdown filtro -->
    <div class="d-flex align-items-center gap-2 mb-3">
      <label class="section-title mb-0">Filtrar por nível:</label>
      <select id="filter-level" class="filter-select" onchange="filterRanking()">
        <option value="all">Todos</option>
        <option value="Recruta">Recruta</option>
        <option value="Guardião">Guardião</option>
        <option value="Mestre">Mestre</option>
      </select>
    </div>

    <!-- Pódio -->
    <div class="podium-wrap mb-3" id="podium"></div>

    <!-- Lista -->
    <p class="section-title">Classificação Geral</p>
    <div id="ranking-list" class="d-flex flex-column gap-2 mb-4"></div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><div class="nav-icon">🏠</div>Início</a>
    <a href="ranking.html" class="active"><div class="nav-icon">🏆</div>Ranking</a>
    <a href="vantagens.html"><div class="nav-icon">🎁</div>Vantagens</a>
    <a href="pet.html"><div class="nav-icon">🐾</div>Pet</a>
    <a href="perfil.html"><div class="nav-icon">👤</div>Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ranking.js"></script>
</body>
</html>
